model:
  type: 'timm'  # timm / custom
  name: "mobilenetv4_conv_small"
  pretrained: True
  num_classes: 3
  drop_path_rate: 0.1

training:
  batch_size: 256
  epochs: 30
  sampler:
    use_weighted_sampler: true
    err_folder_weight: 3.0
  loss:
    type: "focal" # focal / CE
    class_weight:
      enabled: true
    confusion_penalty:
      enabled: true
      weight: 0.75
      c_to_y: 2.5
      n_to_y: 0.75
  optimizer:
    type: "AdamW"
    lr: 1e-5
    weight_decay: 0.05
  use_cuda_amp: True

  lr_scheduler:
    type: "cosine"
    warmup_epochs: 5
    min_lr: 1e-6

  early_stopping:
    enabled: true
    patience: 8
    min_delta: 0.0003

data:
  dataset_path: datasets/train
  val_dataset_path: datasets/val
  input_size: 64
  split_ratio: 0.9